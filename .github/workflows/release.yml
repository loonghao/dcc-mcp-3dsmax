name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for manual MZP build (for example v0.1.0). Leave empty to only run release-please."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Run tests
        run: |
          python -m pip install ".[dev]"
          python -m pytest

      - name: Build wheel and sdist
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-3dsmax
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  build-mzp:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assemble drag-and-drop MZP
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ inputs.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          python packaging/assemble_mzp.py \
            --version "$VERSION" \
            --output dist/mzp \
            --project-root .

      - name: Upload MZP artifact
        uses: actions/upload-artifact@v4
        with:
          name: mzp
          path: dist/mzp/*.mzp

  attach-release-assets:
    needs: [release-please, publish, build-mzp]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download MZP artifacts
        uses: actions/download-artifact@v4
        with:
          name: mzp
          path: dist/mzp/

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*
            dist/mzp/*.mzp

  attach-manual-mzp:
    needs: [release-please, build-mzp]
    if: github.event_name == 'workflow_dispatch' && inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download MZP artifacts
        uses: actions/download-artifact@v4
        with:
          name: mzp
          path: dist/mzp/

      - name: Attach MZP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: dist/mzp/*.mzp
