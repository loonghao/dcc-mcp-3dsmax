tools:
  - name: get_mesh_topology
    description: Summarize vertex, edge, and face counts for explicit mesh targets.
    source_file: action_get_mesh_topology.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: get_selected_mesh_topology
    description: Summarize topology for the current mesh selection.
