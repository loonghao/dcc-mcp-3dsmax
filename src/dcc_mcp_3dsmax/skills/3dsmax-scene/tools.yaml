  - name: set_selection
    description: >-
      Set or extend the active 3ds Max selection by node names or object
      handles.
    source_file: action_set_selection.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names:
          type: array
          items: {type: string, minLength: 1}
          description: Node names to select.
        handles:
          type: array
          items: {type: integer}
          description: Object handles to select.
        replace:
          type: boolean
          default: true
          description: Replace selection when true; otherwise add to selection.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

