tools:
  - name: get_scene_info
    description: >-
      Get basic information about the current 3ds Max scene. Use when the user
      asks about scene name, units, or node counts.
    source_file: action_get_scene_info.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

  - name: list_scene_nodes
    description: >-
      List scene nodes with stable identity, class, parent, visibility, and
      camera flags.
    source_file: action_list_scene_nodes.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        name_filter:
          type: string
          description: Optional case-insensitive substring filter for node names.
        include_hidden:
          type: boolean
          default: true
          description: Include hidden nodes when true.
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 200
          description: Maximum number of nodes to return.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false

