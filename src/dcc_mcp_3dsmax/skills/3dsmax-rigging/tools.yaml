tools:
  - name: create_helper_node
    description: Create a host-native helper node such as a point or dummy.
    source_file: action_create_helper_node.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        helper_type: {type: string, enum: [point, dummy, expose_transform, circle], default: point}
        size: {type: number, exclusiveMinimum: 0, default: 10}
        position: &vector_schema
          type: array
          minItems: 3
          maxItems: 3
          items: {type: number}
    output_schema: &output_schema
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: create_bone_node
    description: Create one bone primitive from start and end positions.
    source_file: action_create_bone_node.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name, start, end]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        start: *vector_schema
        end: *vector_schema
        up_axis: *vector_schema
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: create_joint_chain
    description: Create a simple parented bone chain from point positions.
    source_file: action_create_joint_chain.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [base_name, positions]
      additionalProperties: false
      properties:
        base_name: {type: string, minLength: 1}
        positions:
          type: array
          minItems: 2
          items: *vector_schema
    output_schema: *output_schema
    timeout_hint_secs: 30
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: create_path_helper
    description: Create a curve or path helper from public point data.
    source_file: action_create_path_helper.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name, points]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        points:
          type: array
          minItems: 2
          items: *vector_schema
        closed: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 20
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: list_rig_state
    description: List controllers, constraints, modifiers, deformers, and skinning state on target nodes.
    source_file: action_list_rig_state.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema: &target_schema
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: apply_deformer_modifier
    description: Apply a common host-native deformer modifier to explicit targets.
    source_file: action_apply_deformer_modifier.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [deformer_type]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        deformer_type: {type: string, enum: [skin, bend, twist, ffd_2x2x2, path_deform, skin_wrap, morpher]}
        attributes:
          type: object
          additionalProperties: true
    output_schema: *output_schema
    timeout_hint_secs: 20
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: remove_deformer_modifier
    description: Remove matching deformer modifiers from explicit targets.
    source_file: action_remove_deformer_modifier.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        deformer_type: {type: string, enum: [skin, bend, twist, ffd_2x2x2, path_deform, skin_wrap, morpher]}
        modifier_name: {type: string, minLength: 1}
    output_schema: *output_schema
    timeout_hint_secs: 20
    read_only: false
    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}

  - name: set_constraint_target
    description: Create or update a basic transform constraint target with explicit node validation.
    source_file: action_set_constraint_target.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [constraint_type]
      additionalProperties: false
      properties:
        constrained_name: {type: string, minLength: 1}
        constrained_handle: {type: integer}
        target_name: {type: string, minLength: 1}
        target_handle: {type: integer}
        constraint_type: {type: string, enum: [position, orientation, look_at, path]}
        weight: {type: number, minimum: 0, maximum: 100, default: 100}
    output_schema: *output_schema
    timeout_hint_secs: 20
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: get_character_system_availability
    description: Check whether optional biped, CAT, or character helpers are available.
    source_file: action_get_character_system_availability.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}
