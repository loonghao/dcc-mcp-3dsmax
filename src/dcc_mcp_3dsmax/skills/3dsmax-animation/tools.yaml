tools:
  - name: set_keyframe
    description: >-
      Set a transform keyframe on a 3ds Max node. Use when animating position,
      rotation, or scale. Returns the node name, frame, and keyed property.
    source_file: action_set_keyframe.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      required: [node_name, time]
      additionalProperties: false
      properties:
        node_name:
          type: string
          minLength: 1
          description: Existing node name to animate.
        time:
          type: number
          description: Frame number where the key should be set.
        property:
          type: string
          enum: [position, rotation, scale]
          default: position
          description: Transform property to key.
        value:
          type: array
          minItems: 3
          maxItems: 4
          description: Transform value. Rotation accepts optional fourth quaternion component.
          items:
            type: number
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: play_animation
    description: >-
      Play the current 3ds Max animation range in the viewport. Use when the
      user wants to preview timeline animation. Returns the requested playback
      frame range.
    source_file: action_play_animation.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      properties:
        from_frame:
          type: number
          description: Optional frame to move to before playback starts.
        to_frame:
          type: number
          description: Reserved end frame hint for callers; current implementation uses viewport playback.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: get_time_settings
    description: Query current time, frame range, and frame rate.
    source_file: action_get_time_settings.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: &output_schema
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: get_animation_controllers
    description: Query transform controller metadata for explicit targets.
    source_file: action_get_animation_controllers.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema: &target_schema
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: list_keyframes
    description: List keyframes on explicit targets.
    source_file: action_list_keyframes.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema: *target_schema
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_current_time
    description: Set the current timeline time.
    source_file: action_set_current_time.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [frame]
      additionalProperties: false
      properties:
        frame: {type: number}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_timeline_settings
    description: Set timeline frame range and frame rate.
    source_file: action_set_timeline_settings.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        start_frame: {type: integer}
        end_frame: {type: integer}
        frame_rate: {type: number, exclusiveMinimum: 0}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_transform_keyframe
    description: Set a transform keyframe on explicit targets.
    source_file: action_set_transform_keyframe.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [frame, property, value]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        frame: {type: number}
        property: {type: string, enum: [position, rotation, scale]}
        value: {type: array, minItems: 3, maxItems: 4, items: {type: number}}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: delete_keyframes
    description: Delete matching keyframes on explicit targets.
    source_file: action_delete_keyframes.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        frames: {type: array, items: {type: number}}
        properties: {type: array, items: {type: string, enum: [position, rotation, scale]}}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}

  - name: set_key_interpolation
    description: Set interpolation metadata on matching keys.
    source_file: action_set_key_interpolation.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [interpolation]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        frames: {type: array, items: {type: number}}
        interpolation: {type: string, enum: [linear, step, bezier, auto]}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: bake_transform_animation
    description: Bake simple transform animation samples on explicit targets.
    source_file: action_bake_transform_animation.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [start_frame, end_frame]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        start_frame: {type: integer}
        end_frame: {type: integer}
        step: {type: integer, minimum: 1, default: 1}
    output_schema: *output_schema
    timeout_hint_secs: 60
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: export_animation_curves
    description: Export simple animation curve data for explicit targets.
    source_file: action_export_animation_curves.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema: *target_schema
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: import_animation_curves
    description: Import simple animation curve data using the documented public shape.
    source_file: action_import_animation_curves.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [curve_data]
      additionalProperties: false
      properties:
        curve_data:
          type: object
          additionalProperties: true
    output_schema: *output_schema
    timeout_hint_secs: 30
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}
