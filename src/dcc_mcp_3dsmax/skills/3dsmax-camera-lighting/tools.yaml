tools:
  - name: list_cameras
    description: List camera nodes with transform, target, focal length, and enabled state.
    source_file: action_list_cameras.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: &output_schema
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: list_lights
    description: List light nodes with transform, enabled state, intensity, color, and shadow settings.
    source_file: action_list_lights.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: create_camera
    description: Create a host-native camera node.
    source_file: action_create_camera.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        camera_type: {type: string, enum: [target, free, physical], default: target}
        position: &vector_schema
          type: array
          minItems: 3
          maxItems: 3
          items: {type: number}
        target_position: *vector_schema
        focal_length: {type: number, exclusiveMinimum: 0}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: set_active_camera
    description: Set the active/render camera after validating the target node.
    source_file: action_set_active_camera.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        camera_name: {type: string, minLength: 1}
        camera_handle: {type: integer}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: create_light
    description: Create a host-native light node.
    source_file: action_create_light.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        light_type: {type: string, enum: [omni, spot, directional, skylight], default: omni}
        position: *vector_schema
        target_position: *vector_schema
        intensity: {type: number, minimum: 0}
        color: &color_schema
          type: array
          minItems: 3
          maxItems: 3
          items: {type: integer, minimum: 0, maximum: 255}
        shadows: {type: boolean}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: set_light_properties
    description: Adjust common light properties after validating the target node.
    source_file: action_set_light_properties.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        light_name: {type: string, minLength: 1}
        light_handle: {type: integer}
        enabled: {type: boolean}
        intensity: {type: number, minimum: 0}
        color: *color_schema
        shadows: {type: boolean}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: create_three_point_light_rig
    description: Create a small three-point review lighting rig with fallback errors if lights are unavailable.
    source_file: action_create_three_point_light_rig.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        name_prefix: {type: string, minLength: 1, default: Review}
        target_position: *vector_schema
        distance: {type: number, exclusiveMinimum: 0, default: 100}
    output_schema: *output_schema
    timeout_hint_secs: 30
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}
