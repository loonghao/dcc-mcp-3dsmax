tools:
  - name: capture_viewport
    description: Capture the active viewport to an image file.
    source_file: action_capture_viewport.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [output_path]
      additionalProperties: false
      properties:
        output_path: {type: string, minLength: 1}
        overwrite: {type: boolean, default: false}
    output_schema: &output_schema
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 60
    read_only: false
    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}

  - name: create_preview
    description: Generate a viewport preview/playblast artifact.
    source_file: action_create_preview.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [output_path]
      additionalProperties: false
      properties:
        output_path: {type: string, minLength: 1}
        overwrite: {type: boolean, default: false}
        start_frame: {type: integer}
        end_frame: {type: integer}
    output_schema: *output_schema
    timeout_hint_secs: 180
    read_only: false
    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}

  - name: get_render_settings
    description: Inspect common render settings.
    source_file: action_get_render_settings.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: get_scene_render_statistics
    description: Return scene statistics relevant to rendering.
    source_file: action_get_scene_render_statistics.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_render_output_options
    description: Set render output filename and save-file flag.
    source_file: action_set_render_output_options.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        output_path: {type: string, minLength: 1}
        save_file: {type: boolean}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_frame_range
    description: Set animation/render frame range.
    source_file: action_set_frame_range.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [start_frame, end_frame]
      additionalProperties: false
      properties:
        start_frame: {type: integer}
        end_frame: {type: integer}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_render_resolution
    description: Set render resolution.
    source_file: action_set_render_resolution.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [width, height]
      additionalProperties: false
      properties:
        width: {type: integer, minimum: 1, maximum: 16384}
        height: {type: integer, minimum: 1, maximum: 16384}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_render_camera
    description: Set the active render camera by name or object handle.
    source_file: action_set_render_camera.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        camera_name: {type: string, minLength: 1}
        camera_handle: {type: integer}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_render_quality_preset
    description: Set a common render quality preset.
    source_file: action_set_render_quality_preset.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [preset]
      additionalProperties: false
      properties:
        preset: {type: string, enum: [draft, preview, final]}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}
