tools:
  - name: list_layers
    description: List 3ds Max display layers.
    source_file: action_list_layers.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        include_nodes: {type: boolean, default: false}
    output_schema: &output_schema
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: create_layer
    description: Create a display layer by name.
    source_file: action_create_layer.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: delete_layer
    description: Delete a display layer by name.
    source_file: action_delete_layer.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        delete_nodes: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}

  - name: assign_nodes_to_layer
    description: Assign explicit target nodes to a display layer.
    source_file: action_assign_nodes_to_layer.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema: &target_schema
      type: object
      required: [layer_name]
      additionalProperties: false
      properties:
        layer_name: {type: string, minLength: 1}
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        create_if_missing: {type: boolean, default: true}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: list_node_display_state
    description: List hidden/frozen/color/display-mode state for target nodes.
    source_file: action_list_node_display_state.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_node_display_state
    description: Set hidden/frozen/color/display-mode state on explicit target nodes.
    source_file: action_set_node_display_state.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        hidden: {type: boolean}
        frozen: {type: boolean}
        wire_color: &color_schema
          type: array
          minItems: 3
          maxItems: 3
          items: {type: integer, minimum: 0, maximum: 255}
        object_color: *color_schema
        display_mode: {type: string, enum: [normal, box, wireframe, shaded, bounding_box]}
    output_schema: *output_schema
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: list_custom_properties
    description: List user-defined custom properties on target nodes.
    source_file: action_list_custom_properties.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: get_custom_property
    description: Get one user-defined custom property from explicit target nodes.
    source_file: action_get_custom_property.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [property_name]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        property_name: {type: string, minLength: 1}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: set_custom_property
    description: Set one user-defined custom property on explicit target nodes.
    source_file: action_set_custom_property.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [property_name, value]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        property_name: {type: string, minLength: 1}
        value: {}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: delete_custom_property
    description: Delete one user-defined custom property from explicit target nodes.
    source_file: action_delete_custom_property.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [property_name]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        property_name: {type: string, minLength: 1}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: false
    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}
