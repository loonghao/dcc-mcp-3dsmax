tools:
  - name: create_standard_material
    description: >-
      Create a Standard material in the current 3ds Max scene. Use when the
      user asks for a simple diffuse/specular material. Returns material name,
      diffuse color, specular color, and glossiness.
    source_file: action_create_standard_material.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          default: StandardMat
          description: Name for the new material.
        diffuse:
          type: array
          minItems: 3
          maxItems: 3
          description: Diffuse RGB color components from 0 to 255.
          items:
            type: number
            minimum: 0
            maximum: 255
        specular:
          type: array
          minItems: 3
          maxItems: 3
          description: Specular RGB color components from 0 to 255.
          items:
            type: number
            minimum: 0
            maximum: 255
        glossiness:
          type: number
          minimum: 0
          maximum: 100
          default: 10.0
          description: Standard material glossiness value.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: apply_material
    description: >-
      Apply an existing material to selected or named 3ds Max nodes. Use after
      creating a material or when assigning scene materials. Returns the number
      of nodes updated.
    source_file: action_apply_material.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      required: [material_name]
      additionalProperties: false
      properties:
        material_name:
          type: string
          minLength: 1
          description: Existing material name to apply.
        node_names:
          type: array
          description: Optional target node names. Uses current selection when omitted.
          items:
            type: string
            minLength: 1
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: list_scene_materials
    description: List scene materials with common parameters and bitmap connections.
    source_file: action_list_scene_materials.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: list_node_material_assignments
    description: List material assignments for explicit nodes or the current selection.
    source_file: action_list_node_material_assignments.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: inspect_material
    description: Inspect common parameters and maps for one material.
    source_file: action_inspect_material.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [material_name]
      additionalProperties: false
      properties:
        material_name: {type: string, minLength: 1}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: list_bitmap_connections
    description: List bitmap/map connections for one material.
    source_file: action_list_bitmap_connections.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [material_name]
      additionalProperties: false
      properties:
        material_name: {type: string, minLength: 1}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: create_physical_material
    description: Create a Physical/PBR-friendly material when the host supports it.
    source_file: action_create_physical_material.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        base_color: {type: array, minItems: 3, maxItems: 3, items: {type: number, minimum: 0, maximum: 255}}
        roughness: {type: number, minimum: 0, maximum: 1}
        metalness: {type: number, minimum: 0, maximum: 1}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: create_pbr_material
    description: Create a PBR-friendly material using Physical material where available.
    source_file: action_create_pbr_material.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1}
        base_color: {type: array, minItems: 3, maxItems: 3, items: {type: number, minimum: 0, maximum: 255}}
        roughness: {type: number, minimum: 0, maximum: 1}
        metalness: {type: number, minimum: 0, maximum: 1}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: reset_material
    description: Reset explicit nodes or selection to no material or a named default material.
    source_file: action_reset_material.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        default_material_name: {type: string, minLength: 1}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

  - name: set_material_attributes
    description: Set common material attributes such as base color, roughness, metalness, opacity, and glossiness.
    source_file: action_set_material_attributes.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [material_name, attributes]
      additionalProperties: false
      properties:
        material_name: {type: string, minLength: 1}
        attributes:
          type: object
          additionalProperties: true
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: assign_bitmap_texture
    description: Assign a bitmap texture path to a common material map slot.
    source_file: action_assign_bitmap_texture.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [material_name, slot, texture_path]
      additionalProperties: false
      properties:
        material_name: {type: string, minLength: 1}
        slot: {type: string, enum: [diffuse, base_color, normal, bump, roughness, metalness, opacity]}
        texture_path: {type: string, minLength: 1}
        allow_missing: {type: boolean, default: false}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: report_missing_textures
    description: Report missing bitmap texture paths for scene materials.
    source_file: action_report_missing_textures.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        material_names: {type: array, items: {type: string, minLength: 1}}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}
