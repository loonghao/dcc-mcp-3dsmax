    input_schema:
      type: object
      additionalProperties: false
      properties:
        radius:
          type: number
          exclusiveMinimum: 0
          default: 30.0
          description: Cylinder radius in current scene units.
        height:
          type: number
          exclusiveMinimum: 0
          default: 100.0
          description: Cylinder height in current scene units.
        name:
          type: string
          minLength: 1
          description: Optional scene node name for the new cylinder.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: create_plane
    description: >-
      Create a plane primitive in the current 3ds Max scene. Use when the user
      asks to add a flat plane or ground surface. Returns the created node name,
      object handle, width, and length.
    source_file: action_create_plane.py
    execution: sync
