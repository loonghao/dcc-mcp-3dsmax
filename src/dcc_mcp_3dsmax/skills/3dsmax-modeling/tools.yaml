tools:
  - name: create_box
    description: >-
      Create a box primitive in the current 3ds Max scene. Use when the user
      asks to add a cube or rectangular box. Returns the created node name,
      object handle, and dimensions.
    source_file: action_create_box.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      properties:
        width:
          type: number
          exclusiveMinimum: 0
          default: 100.0
          description: Box width in current scene units.
        height:
          type: number
          exclusiveMinimum: 0
          default: 100.0
          description: Box height in current scene units.
        depth:
          type: number
          exclusiveMinimum: 0
          default: 100.0
          description: Box depth in current scene units.
        name:
          type: string
          minLength: 1
          description: Optional scene node name for the new box.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: create_sphere
    description: >-
      Create a sphere primitive in the current 3ds Max scene. Use when the user
      asks to add a sphere or ball. Returns the created node name, object
      handle, and radius.
    source_file: action_create_sphere.py
    execution: sync
    affinity: main
    input_schema:
      type: object
      additionalProperties: false
      properties:
        radius:
          type: number
          exclusiveMinimum: 0
          default: 50.0
          description: Sphere radius in current scene units.
        name:
          type: string
          minLength: 1
          description: Optional scene node name for the new sphere.
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
        status:
          type: string
        message:
          type: string
        data:
          type: object
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false

  - name: create_cylinder
    description: >-
      Create a cylinder primitive in the current 3ds Max scene. Use when the
      user asks to add a cylinder or column. Returns the created node name,
      object handle, radius, and height.
    source_file: action_create_cylinder.py
    execution: sync
