tools:
  - name: validate_naming
    description: Validate node names for pattern compliance and duplicates.
    source_file: action_validate_naming.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema: &target_schema
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        pattern: {type: string, default: "^[A-Za-z][A-Za-z0-9_]*$"}
        allow_spaces: {type: boolean, default: false}
    output_schema: &output_schema
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_transforms
    description: Validate zeroed position and rotation plus unit scale.
    source_file: action_validate_transforms.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      <<: *target_schema
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        tolerance: {type: number, exclusiveMinimum: 0, default: 0.001}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_pivots
    description: Validate pivot placement against origin or bounds center.
    source_file: action_validate_pivots.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        mode: {type: string, enum: [bounds_center, origin], default: bounds_center}
        tolerance: {type: number, exclusiveMinimum: 0, default: 0.001}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_mesh_topology
    description: Validate open edges, isolated vertices, triangles, quads, and non-quad counts.
    source_file: action_validate_mesh_topology.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        max_open_edges: {type: integer, minimum: 0, default: 0}
        max_isolated_vertices: {type: integer, minimum: 0, default: 0}
        max_ngons: {type: integer, minimum: 0, default: 0}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_smoothing_groups
    description: Validate smoothing-group coverage on target meshes.
    source_file: action_validate_smoothing_groups.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_material_assignments
    description: Validate material assignment on target nodes.
    source_file: action_validate_material_assignments.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_texture_paths
    description: Validate referenced texture file paths.
    source_file: action_validate_texture_paths.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_uv_channels
    description: Validate required UV channels on target nodes.
    source_file: action_validate_uv_channels.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        required_channels: {type: array, items: {type: integer}, default: [1]}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: validate_uv_overlaps
    description: Validate UV overlap counts on target nodes.
    source_file: action_validate_uv_overlaps.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        max_overlap_count: {type: integer, minimum: 0, default: 0}
    output_schema: *output_schema
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: run_asset_readiness_checks
    description: Run selected validators and return an aggregate report with per-check details.
    source_file: action_run_asset_readiness_checks.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        validators:
          type: array
          items:
            type: string
            enum: [naming, transforms, pivots, mesh_topology, smoothing_groups, material_assignments, texture_paths, uv_channels, uv_overlaps]
        required_uv_channels: {type: array, items: {type: integer}, default: [1]}
        naming_pattern: {type: string, default: "^[A-Za-z][A-Za-z0-9_]*$"}
    output_schema: *output_schema
    timeout_hint_secs: 20
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}
