tools:
  - name: list_uv_channels
    description: List UV/map channels for explicit targets.
    source_file: action_list_uv_channels.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 10
    read_only: true
    destructive: false
    idempotent: true
    annotations: {read_only_hint: true, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

  - name: create_uv_channel
    description: Create or enable a UV/map channel on explicit targets.
    source_file: action_create_uv_channel.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [channel]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        channel: {type: integer, minimum: 1, maximum: 99}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 15
    read_only: false
    destructive: false
    idempotent: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: true, open_world_hint: false}

