    destructive: true
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: true, idempotent_hint: false, open_world_hint: false}

  - name: copy_uv_channel
    description: Copy UV data from one channel to another on explicit targets.
    source_file: action_copy_uv_channel.py
    execution: sync
