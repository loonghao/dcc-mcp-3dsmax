  - name: apply_uv_projection
    description: Add a UVW Map projection modifier to explicit targets.
    source_file: action_apply_uv_projection.py
    execution: sync
    affinity: main
    enforce_thread_affinity: true
    input_schema:
      type: object
      required: [channel, projection]
      additionalProperties: false
      properties:
        node_names: {type: array, items: {type: string, minLength: 1}}
        handles: {type: array, items: {type: integer}}
        use_selection: {type: boolean, default: false}
        channel: {type: integer, minimum: 1, maximum: 99}
        projection: {type: string, enum: [planar, box, cylindrical, spherical]}
        length: {type: number, exclusiveMinimum: 0}
        width: {type: number, exclusiveMinimum: 0}
        height: {type: number, exclusiveMinimum: 0}
    output_schema:
      type: object
      additionalProperties: true
      properties:
        success: {type: boolean}
        status: {type: string}
        message: {type: string}
        data: {type: object}
    timeout_hint_secs: 30
    read_only: false
    destructive: false
    idempotent: false
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false, open_world_hint: false}

